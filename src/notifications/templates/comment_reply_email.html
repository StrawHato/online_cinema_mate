<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Reply to Your Comment</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f5f5f5; padding:30px;">

<div style="
    max-width:650px;
    margin:auto;
    background:#ffffff;
    border-radius:10px;
    padding:30px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
">

  <h2 style="color:#1976d2;">
    💬 Someone replied to your comment
  </h2>

  <p>
    Hello <strong>{{ username }}</strong>,
  </p>

  <p>
    You have received a new reply to your comment on
    <strong>{{ movie_name }}</strong>.
  </p>

  <h3>Your comment</h3>

  <blockquote style="
        border-left:4px solid #1976d2;
        margin:0;
        padding:12px 18px;
        background:#f8f9fa;
    ">
    {{ comment_text }}
  </blockquote>

  <h3 style="margin-top:25px;">
    Reply
  </h3>

  <blockquote style="
        border-left:4px solid #43a047;
        margin:0;
        padding:12px 18px;
        background:#f8f9fa;
    ">
    {{ reply_text }}
  </blockquote>

  <p style="margin-top:30px;">
    Thank you for participating in the discussion!
  </p>

</div>

</body>
</html>
